
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/colors.conf

# gruvbox color scheme
source = ~/.config/hypr/gruvbox-dark.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,1920x1080,auto,1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty 
$fileManager = thunar 
$menu = wofi --show drun # for desktop applications
$config-files = /home/daksh/.local/bin/config-files
$scripts = /home/daksh/.config/hypr/script/wofi-run-scripts 
$emoji = /home/daksh/.config/hypr/script/wofi-emoji
$brightness = /home/daksh/.config/dunst/scripts/backlight
$volume = /home/daksh/.config/dunst/scripts/volume

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet & 
# exec-once = eww daemon
exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = hyprctl setcursor "Capitaine Cursors (Gruvbox)" 15
# exec-once = hypridle
exec-once = "/home/daksh/.local/bin/wallpaperchanger" 
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

# nvidia electron discord
# exec-once = LIBVA_DRIVER_NAME=i915 vesktop --ignore-gpu-blocklist --disable-features=UseOzonePlatform --enable-features=VaapiVideoDecoder --use-gl=desktop --enable-gpu-rasterization --enable-zero-copy 

############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# nvidia drivers
# env = DRI_PRIME,pci-0000_01_00_0
# env = __VK_LAYER_NV_optimus,NVIDIA_only 
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    
    # col.active_border = rgba(d79921ee) rgba(cc141dee) 45deg # yellow and red color
    col.active_border = rgba(d79921ee) 
    col.inactive_border = rgba($transparent)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0 # Change transparency of focused and unfocused windows (main config)
    active_opacity = 1.0
    inactive_opacity = 0.9
    # drop_shadow = false 
    shadow {
      enabled = false
    }

    # https://wiki.hypr#land.org#/Configuring/Variables/#blur
    blur {
        enabled = false 
        ### main blur (gausson)
        # size = 5
        # passes = 3
        # ignore_opacity = true
        # new_optimizations = on
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    # enabled = false 

   # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

   # bezier = myBezier, 0.05, 0.9, 0.1, 1.05
   # animation = windows, 1, 5, myBezier
   # animation = windowsOut, 1, 7, default, slide # slides bottom 
   # # animation = windowsOut, 1, 5, default, popin 80% # fades out default
   # animation = border, 1, 10, default,
   # animation = borderangle, 1, 8, default
   # animation = fade, 1, 4, default
   # animation = workspaces, 1, 4, default, slidefade 
   

   bezier = linear, 0, 0, 1, 1
   bezier = md3_standard, 0.2, 0, 0, 1
   bezier = md3_decel, 0.05, 0.7, 0.1, 1
   bezier = md3_accel, 0.3, 0, 0.8, 0.15
   bezier = overshot, 0.05, 0.9, 0.1, 1.1
   bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
   bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
   bezier = menu_decel, 0.1, 1, 0, 1
   bezier = menu_accel, 0.38, 0.04, 1, 0.07
   bezier = easeInOutCirc, 0.85, 0, 0.15, 1
   bezier = easeOutCirc, 0, 0.55, 0.45, 1
   bezier = easeOutExpo, 0.16, 1, 0.3, 1
   bezier = softAcDecel, 0.26, 0.26, 0.15, 1
   bezier = md2, 0.4, 0, 0.2, 1 
   animation = windows, 1, 3, md3_decel, popin 60%
   animation = windowsIn, 1, 3, md3_decel, popin 60%
   animation = windowsOut, 1, 3, md3_accel, popin 60%
   animation = border, 1, 10, default
   animation = fade, 1, 3, md3_decel
   animation = workspaces, 1, 7, menu_decel, slide
   animation = specialWorkspace, 1, 3, md3_decel, slidevert
   
   # bezier = overshot, 0.13, 0.99, 0.29, 1.1
   # animation = windows, 1, 4, overshot, slide
   # animation = border, 1, 10, default
   # animation = borderangle, 1, 200, default, loop
   # animation = fade, 1, 10, default
   # animation = workspaces, 1, 6, overshot, slidefade
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# master {
#    new_is_master = true
#}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(

    # window swallow
    # enable_swallow = true
    # swallow_regex = ^(kitty -e tmux)$
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    numlock_by_default = true
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = true
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal -e tmux
bind = $mainMod SHIFT, RETURN, exec, [float; size 1300 600] $terminal 
bind = $mainMod SHIFT, V, exec, [float; size 700 500] $terminal -e cava 
bind = $mainMod SHIFT, C, exec, [float; size 1000 400] $terminal -e tty-clock -c -s -C 3 
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Y, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, $scripts
bind = $mainMod, period, exec, $emoji
bind = $mainMod SHIFT, D, exec, $config-files
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, L, exec, swaylock -f -c 000000
bind = $mainMod SHIFT, L, exec, wlogout
bind = $mainMod, F, fullscreen,
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# color picker
bind = $mainMod SHIFT, P, exec, hyprpicker -a

# Screenshot with image copy
bind = , Print, exec, IMG=~/Pictures/screenshots/$(date '+%y%m%d_%H-%M-%S').png && grim -g "$(slurp)" $IMG && wl-copy < $IMG

# brightness
bind = ,xf86monbrightnessup, exec, $brightness up 
bind = ,xf86monbrightnessdown, exec, $brightness down
# bind = ,xf86monbrightnessup, exec, brightnessctl set 5%+
# bind = ,xf86monbrightnessdown, exec, brightnessctl set 5%-

# volume
bind = ,xf86audiomute, exec, $volume mute 
bind = ,xf86audioraisevolume, exec, $volume up 
bind = ,xf86audiolowervolume, exec, $volume down
# bind = ,xf86audiomute, exec, pactl set-sink-mute @default_sink@ toggle
# bind = ,xf86audioraisevolume, exec, pactl set-sink-volume @default_sink@ +5% 
# bind = ,xf86audiolowervolume, exec, pactl set-sink-volume @default_sink@ -5% 

# media player
bindl=, xf86audioplay, exec, playerctl play-pause
bindl=, xf86audioprev, exec, playerctl previous
bindl=, xf86audionext, exec, playerctl next

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Window resizing                           X   Y
bind = $mainMod CTRL, left,  resizeactive, -60  0
bind = $mainMod CTRL, right, resizeactive,  60  0
bind = $mainMod CTRL, up,    resizeactive,  0  -60
bind = $mainMod CTRL, down,  resizeactive,  0   60

# workspace cycle
bind = $mainMod, TAB, workspace,previous

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

 # Move focused window to a workspace silently
bind = $mainMod+Alt, 1, movetoworkspacesilent, 1
bind = $mainMod+Alt, 2, movetoworkspacesilent, 2
bind = $mainMod+Alt, 3, movetoworkspacesilent, 3
bind = $mainMod+Alt, 4, movetoworkspacesilent, 4
bind = $mainMod+Alt, 5, movetoworkspacesilent, 5
bind = $mainMod+Alt, 6, movetoworkspacesilent, 6
bind = $mainMod+Alt, 7, movetoworkspacesilent, 7
bind = $mainMod+Alt, 8, movetoworkspacesilent, 8
bind = $mainMod+Alt, 9, movetoworkspacesilent, 9
bind = $mainMod+Alt, 0, movetoworkspacesilent, 10 

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

